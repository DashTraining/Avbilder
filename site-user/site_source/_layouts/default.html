<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
  <link rel="stylesheet" href="/assets/css/site.css">
  <script src="/assets/js/site.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Avbilder home"><small>www.</small><span>avbilder</span><small>.no</small></a>

      <a href="/sessions/">Sessions</a>
      <a href="/register/">Register</a>
      <a href="/portal/">Client portal</a>
    </nav>
  </header>
  <main>{{ content }}</main>
  <footer class="site-footer">
    <div>
       <span><strong>www.avbilder.no</strong> demo site of a photography business for Glasspaper Inspirasjonsdagene 2026.</span>
    </div>
