trigger:
  branches:
    include:
      - main

variables:
- group: avbilder-secrets

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

- task: UseDotNet@2
  displayName: 'Install .NET SDK 8'
  inputs:
    packageType: 'sdk'
    version: '8.x'

- task: AzureStaticWebApp@0
  displayName: 'Deploy Static Web App and managed API'
  inputs:
    app_location: 'site'
    api_location: 'api/Avbilder.Api'
    skip_app_build: true
    azure_static_web_apps_api_token: '$(swa-deployment-token)'
