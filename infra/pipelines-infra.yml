trigger: none

variables:
  azureServiceConnection: 'sc-avbilder-azure'
  deploymentName: 'avbilder-infra-weu'
  location: 'westeurope'

stages:
- stage: Validate
  displayName: Validate Bicep
  jobs:
  - job: Validate
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    - task: AzureCLI@2
      displayName: Build Bicep
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az bicep build --file infra/main.bicep

- stage: Deploy
  displayName: Deploy infrastructure
  dependsOn: Validate
  jobs:
  - deployment: DeployInfra
    environment: avbilder
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: Subscription deployment
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment sub create \
                  --name "$(deploymentName)" \
                  --location "$(location)" \
                  --template-file infra/main.bicep \
                  --parameters infra/main.bicepparam
